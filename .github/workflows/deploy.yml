name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Which project to deploy (leave blank to deploy all)"
        required: false
        default: "all"
        type: choice
        options: [all, public, admin, supabase]

# Only allow one deployment per project to run at a time.
# If a new push arrives while one is running, cancel the in-progress run.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Detect which directories changed ────────────────────────────────────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      public:   ${{ steps.filter.outputs.public }}
      admin:    ${{ steps.filter.outputs.admin }}
      supabase: ${{ steps.filter.outputs.supabase }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            public:
              - 'Public/**'
            admin:
              - 'Admin/**'
            supabase:
              - 'Supabase/**'


  # ── Deploy: Public portfolio ─────────────────────────────────────────────────
  deploy-public:
    needs: detect
    if: |
      needs.detect.outputs.public == 'true' ||
      github.event.inputs.target == 'public' ||
      github.event.inputs.target == 'all'
    runs-on: ubuntu-latest
    name: Deploy Public (Cloudflare Pages)
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        # Runs from Public/ so wrangler finds wrangler.toml and Public/functions/
        working-directory: Public
        run: npx wrangler@latest pages deploy public --project-name=${{ secrets.CF_PUBLIC_PROJECT }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}


  # ── Deploy: Admin dashboard ──────────────────────────────────────────────────
  deploy-admin:
    needs: detect
    if: |
      needs.detect.outputs.admin == 'true' ||
      github.event.inputs.target == 'admin' ||
      github.event.inputs.target == 'all'
    runs-on: ubuntu-latest
    name: Deploy Admin (Cloudflare Pages)
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        # Runs from Admin/ — wrangler auto-excludes functions/ from static assets
        working-directory: Admin
        run: npx wrangler@latest pages deploy . --project-name=${{ secrets.CF_ADMIN_PROJECT }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}


  # ── Deploy: Supabase Edge Functions ─────────────────────────────────────────
  deploy-supabase:
    needs: detect
    if: |
      needs.detect.outputs.supabase == 'true' ||
      github.event.inputs.target == 'supabase' ||
      github.event.inputs.target == 'all'
    runs-on: ubuntu-latest
    name: Deploy Supabase Edge Functions
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all Edge Functions
        # Deploys every function found in Supabase/functions/
        run: |
          for func in analytics auth config contacts email ping; do
            echo "Deploying $func..."
            supabase functions deploy "$func" \
              --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
              --functions-dir Supabase/functions
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
