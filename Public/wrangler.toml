# wrangler.toml — Cloudflare Pages project configuration for the public portfolio
#
# Cloudflare Pages project settings (set in the CF dashboard):
#   Root directory:          Public
#   Build command:           (none — no build step)
#   Build output directory:  (leave blank — serves the whole Public folder)
#
# With Root directory = "Public", CF Pages resolves:
#   Static files:      Public/            (index.html, assets/, etc.)
#   Pages Functions:   Public/functions/  (automatic — no extra config needed)
#
# Env vars to set in the Cloudflare dashboard (Settings → Environment variables):
#   SUPABASE_URL         — https://<ref>.supabase.co
#   PORTFOLIO_ORIGIN     — __SITE_URL__ (or custom domain)
#   CLIENT_AUTH_SECRET   — shared secret used to authenticate public→backend requests
#
# Local dev:
#   cd Public && npx wrangler pages dev . --compatibility-flag=nodejs_compat
#   Secrets go in Public/.dev.vars (gitignored)
name                   = "__CF_PUBLIC_PROJECT__"
pages_build_output_dir = "."
compatibility_date     = "2024-09-23"
compatibility_flags    = ["nodejs_compat"]
