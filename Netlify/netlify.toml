# Netlify/netlify.toml
#
# This Netlify site is the SEO redirect layer for the portfolio.
# Its sole purpose is to permanently 301-redirect all traffic to the
# Cloudflare Pages domain at __SITE_HOST__, preserving URL paths
# so that any inbound links from external sites continue to resolve correctly.
#
# How to deploy:
#   1. Create a Netlify site connected to this repo.
#   2. Set the publish directory to: Netlify
#   3. No build command needed. Deploy.
#
# The :splat capture preserves full paths on redirect:
#   /about  →  __SITE_URL__/about
#   /       →  __SITE_URL__/

[build]
    publish = "."
    ignore  = "exit 0"

[[redirects]]
    from   = "/*"
    to     = "__SITE_URL__/:splat"
    status = 301
    force  = true
