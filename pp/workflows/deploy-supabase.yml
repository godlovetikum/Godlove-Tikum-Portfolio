name: Deploy — Supabase Edge Functions

# Triggered manually from the GitHub Actions tab — works from any device,
# including mobile.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   SUPABASE_ACCESS_TOKEN — personal access token from supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_REF  — project reference ID (supabase.com → your project → Settings → General)
#
# What this deploys:
#   All Edge Functions under Supabase/functions/ except _shared (a utility
#   directory, not a deployable function). JWT verification is disabled at the
#   Supabase gateway — all auth is handled inside the functions themselves
#   using the CLIENT_AUTH_SECRET header.
#
# Optional: deploy a single function by name using the workflow input.
#
# Schema migrations are NOT run automatically.
# Apply them manually in the Supabase SQL editor (run 01 → 12 in order).

on:
  workflow_dispatch:
    inputs:
      function:
        description: "Function name to deploy (leave blank to deploy all)"
        required: false
        default: ""
        type: string

jobs:
  deploy:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PROJECT_REF="${{ secrets.SUPABASE_PROJECT_REF }}"
          FUNCTION_INPUT="${{ github.event.inputs.function }}"

          if [ -n "$FUNCTION_INPUT" ]; then
            echo "Deploying single function: $FUNCTION_INPUT"
            supabase functions deploy "$FUNCTION_INPUT" \
              --project-ref "$PROJECT_REF" \
              --no-verify-jwt
          else
            echo "Deploying all Edge Functions..."
            for dir in Supabase/functions/*/; do
              fn=$(basename "$dir")
              # Skip _shared — utility directory, not a deployable function
              [[ "$fn" == _* ]] && continue
              echo "  → $fn"
              supabase functions deploy "$fn" \
                --project-ref "$PROJECT_REF" \
                --no-verify-jwt
            done
          fi
