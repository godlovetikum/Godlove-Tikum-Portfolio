name: Deploy — Admin Dashboard

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options: [production, preview]

jobs:
  deploy:
    name: Build & Deploy Admin Dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Substitute portfolio.config.json tokens
        # Same substitution as deploy-public.yml but targeting Admin source files.
        run: |
          CONFIG="portfolio.config.json"
          FILES=$(find Admin -type f \( -name "*.html" -o -name "*.js" \) \
            ! -path "Admin/functions/*")

          while IFS= read -r entry; do
            KEY=$(echo "$entry"   | jq -r '.key')
            VALUE=$(echo "$entry" | jq -r '.value')
            TOKEN="__${KEY^^}__"
            echo "$FILES" | xargs sed -i "s|${TOKEN}|${VALUE}|g"
          done < <(jq -c 'to_entries[] | select(.key != "_comment")' "$CONFIG")

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            pages deploy .
            --project-name=${{ secrets.CF_ADMIN_PROJECT }}
            ${{ github.event.inputs.environment == 'preview' && '--branch=preview' || '' }}
          workingDirectory: Admin
