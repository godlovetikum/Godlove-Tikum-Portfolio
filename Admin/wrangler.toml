# wrangler.toml — Cloudflare Pages project configuration for the Admin dashboard
#
# Cloudflare Pages project settings (set in the CF dashboard):
#   Root directory:          Admin
#   Build command:           (none — no build step)
#   Build output directory:  (leave blank — serves the whole Admin folder)
#
# With Root directory = "Admin", CF Pages resolves:
#   Static files:      Admin/
#   Pages Functions:   Admin/functions/   (automatic — no extra config needed)
#
# Env vars to set in the Cloudflare dashboard (Settings → Environment variables):
#   SUPABASE_URL         — https://<ref>.supabase.co
#   ADMIN_ORIGIN         — https://admin.godlovetikum.pages.dev (or custom domain)
#   CLIENT_AUTH_SECRET   — shared secret used to authenticate public→backend requests
#
# Local dev:
#   cd Admin && npx wrangler pages dev . --compatibility-flag=nodejs_compat
#   Secrets go in Admin/.dev.vars (gitignored)
name                   = "admin"
pages_build_output_dir = "."
